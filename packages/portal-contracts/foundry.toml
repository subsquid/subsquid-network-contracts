[profile.ci]

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 1
via_ir = true
bytecode_hash = "none"
cbor_metadata = false

[profile.arbitrum]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 1
via_ir = true
bytecode_hash = "none"
cbor_metadata = false
code_size_limit = 49152  # 48KB - Arbitrum supports larger contracts

# Coverage configuration - exclude test files and scripts
[profile.default.fuzz]
runs = 256

# Tenderly verification configuration
[etherscan]
arbitrum = { key = "338GM13A6DDG5S86A5CJBT2ZV7SRUGUPZ2", chain = 42161, url = "https://api.arbiscan.io/api" }
arbitrum_sepolia = { key = "338GM13A6DDG5S86A5CJBT2ZV7SRUGUPZ2", chain = 421614, url = "https://api-sepolia.arbiscan.io/api" }
unknown_chain = { key = "ZcvkdUX2yO0MWRQ6nA3R0E7gPnscsySk", chain = 42161, url = "https://virtual.arbitrum.eu.rpc.tenderly.co/1975f1f7-1857-4714-b409-e3620497dad8/verify/etherscan" }

